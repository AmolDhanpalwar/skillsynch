name: CI

on:
  pull_request:
    branches: [main]
  # Allow manual trigger for branch-based testing
  workflow_dispatch:

# Cancel superseded runs when a developer force-pushes to their PR branch
concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Typecheck / Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint runs first — fastest signal, catches most typos and style issues
      - name: Lint
        run: npm run lint

      # Typecheck separately so failures are clearly attributed in the CI log
      - name: Typecheck
        run: npm run typecheck

      # Run vitest in CI mode (not watch). Env vars are needed because the
      # supabaseClient module evaluates import.meta.env.* at parse time even
      # though all tests mock the module via vi.mock(). Placeholders satisfy
      # Vite's define transform without making real network connections.
      - name: Test
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci

  # Separate job: verify the Docker image builds successfully on every PR.
  # Does NOT push to ECR — just ensures no broken build reaches main.
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Only run on PRs that touch files affecting the build
    if: |
      contains(github.event.pull_request.changed_files, 'Dockerfile') ||
      contains(github.event.pull_request.changed_files, 'nginx.conf') ||
      contains(github.event.pull_request.changed_files, 'package-lock.json') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image (no push, placeholder env)
        run: |
          docker build \
            --build-arg VITE_SUPABASE_URL="https://placeholder.supabase.co" \
            --build-arg VITE_SUPABASE_ANON_KEY="placeholder-anon-key" \
            --tag skillsync-app:pr-check \
            --file Dockerfile \
            .

      - name: Smoke test — health endpoint responds
        run: |
          docker run --rm -d -p 8080:80 --name skillsync-check skillsync-app:pr-check
          sleep 3
          curl -sf http://localhost:8080/health
          docker stop skillsync-check
