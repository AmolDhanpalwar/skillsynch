server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy     "geolocation=(), microphone=()"     always;

    # CSP allows Supabase REST + Realtime (wss) connections used by the app.
    # 'unsafe-inline' in script-src is required for Vite's module-preload snippets.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data: https://images.pexels.com; frame-ancestors 'none';"
        always;

    # ── Immutable caching for Vite hashed assets ──────────────────────────────
    # Vite fingerprints all filenames with content hashes, so 1-year cache is safe.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── ALB / ECS health check endpoint ──────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback — all unmatched paths serve index.html ──────────────────
    # Required for react-router-dom BrowserRouter to work on direct URL access
    # and hard refresh without a 404 from the server.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block dotfiles (.env, .git, etc.) ────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
